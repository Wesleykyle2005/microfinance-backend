version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: microfinance-db
    environment:
      POSTGRES_USER: microfinance
      POSTGRES_PASSWORD: microfinance_secret
      POSTGRES_DB: microfinance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microfinance-network

  redis:
    image: redis:7-alpine
    container_name: microfinance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microfinance-network

volumes:
  postgres_data:
  redis_data:

networks:
  microfinance-network:
    driver: bridge
